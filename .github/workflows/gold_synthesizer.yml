name: Gold Synthesizer

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 0"  # Каждое воскресенье в 05:00 UTC

jobs:
  synthesize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Run gold_synthesizer.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOLD_BATCH_SIZE: "40"
        run: python gold_synthesizer.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 05_BIZ_RECIPES/ 08_IDEAS_LAB/08.1_RAW_IDEAS/ 08_IDEAS_LAB/08.2_SELECTED/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "synth: gold_synthesizer — $(date +%Y-%m-%d)"
          git push
