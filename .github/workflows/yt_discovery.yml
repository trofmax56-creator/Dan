name: YouTube Discovery

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Check API key
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          if [ -z "$YOUTUBE_API_KEY" ]; then
            echo "ERROR: YOUTUBE_API_KEY is empty or not set"
            exit 1
          else
            echo "YOUTUBE_API_KEY is set, length=${#YOUTUBE_API_KEY}"
          fi

      - name: Run yt_discovery.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python 02_TOOLS/Scripts/yt_discovery.py

      - name: Commit new raw files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 00_RAW/YouTube/
          git diff --cached --quiet || git commit -m "chore: yt_discovery — new raw files $(date +%Y-%m-%d)"
          git push
